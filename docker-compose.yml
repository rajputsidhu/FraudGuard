version: '3.8'

services:
  backend:
    build:
      context: .
      target: backend
    container_name: fraud_backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data_processed:/app/data_processed
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    container_name: fraud_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
